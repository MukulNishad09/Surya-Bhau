<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Prediction UI</title>

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0a0f1f, #050814);
  color: white;
  text-align: center;
}

/* Glass effect */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,255,255,0.1);
}

/* Container */
.container {
  padding: 20px;
}

/* Profile */
.profile img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid transparent;
  background: linear-gradient(45deg,#00f0ff,#a855f7) border-box;
  padding: 3px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-10px);}
  100% { transform: translateY(0px);}
}

h1 {
  margin: 10px 0;
}

/* Stats */
.stats {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.card {
  flex: 1;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #00f0ff;
}

.card h2 {
  color: #a855f7;
}

/* Button */
.btn {
  margin-top: 25px;
  width: 90%;
  padding: 15px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  color: white;
  cursor: pointer;
  background: linear-gradient(270deg,#00c6ff,#a044ff,#00c6ff);
  background-size: 400% 400%;
  animation: gradientMove 6s ease infinite;
  box-shadow: 0 0 20px rgba(0,255,255,0.5);
}

@keyframes gradientMove {
  0% { background-position: 0%;}
  50% { background-position: 100%;}
  100% { background-position: 0%;}
}

.btn:hover {
  transform: scale(1.05);
}

/* Timer */
.timer-box {
  margin-top: 25px;
  padding: 20px;
}

.timer {
  display: flex;
  justify-content: space-around;
  margin-top: 10px;
}

.timer div {
  font-size: 22px;
  color: #00eaff;
}

/* Section */
.section {
  margin-top: 25px;
  padding: 20px;
  text-align: left;
}

/* Glow border animation */
.glow-border {
  position: relative;
}

.glow-border::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  padding: 2px;
  background: linear-gradient(45deg,#00f0ff,#a855f7,#00f0ff);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: borderGlow 4s linear infinite;
}

@keyframes borderGlow {
  0% { filter: hue-rotate(0deg);}
  100% { filter: hue-rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

  <!-- Profile -->
  <div class="profile">
    <img src="logo.png">
    <h1>𝘼𝙉𝙐𝙍𝘼𝙂 𝙏𝙄𝙋𝙎 [ 🇮🇳 ]™</h1>
    <p style="color:#00eaff;">👥 10K+ Followers</p>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="card glow-border">
      <h2>50K+</h2>
      <p>Subscribers</p>
    </div>
    <div class="card glow-border">
      <h2>1547</h2>
      <p>Predictions</p>
    </div>
    <div class="card glow-border">
      <h2>98%</h2>
      <p>Accuracy</p>
    </div>
  </div>

  <!-- Button -->
  <button class="btn" onclick="joinTelegram()">Join Telegram Channel</button>

  <!-- Timer -->
  <div class="timer-box glass">
    <h3>Next Prediction In</h3>
    <div class="timer">
      <div><span id="hours">01</span><br>Hours</div>
      <div><span id="minutes">00</span><br>Minutes</div>
      <div><span id="seconds">00</span><br>Seconds</div>
    </div>
  </div>

  <!-- Section -->
  <div class="section glass">
    <h3>Pre-match Predictions</h3>
    <p>Daily expert analysis before matches start with high win rate predictions.</p>
  </div>

</div>

<script>

// Telegram redirect
function joinTelegram() {
  window.location.href = "https://t.me/+tZsZ8StBn7BhODBl";
}

// Timer
let time = 3600;

setInterval(() => {
  let h = Math.floor(time / 3600);
  let m = Math.floor((time % 3600) / 60);
  let s = time % 60;

  document.getElementById("hours").innerText = String(h).padStart(2,'0');
  document.getElementById("minutes").innerText = String(m).padStart(2,'0');
  document.getElementById("seconds").innerText = String(s).padStart(2,'0');

  if (time > 0) time--;
}, 1000);

</script>

</body>
</html>
