<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Landing Page</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

background:
radial-gradient(circle at top left,#0d7f73 0%,transparent 40%),
radial-gradient(circle at bottom right,#7b4dff 0%,transparent 40%),
linear-gradient(135deg,#05172a,#081321,#020617);

overflow-x:hidden;
}

.card{
width:100%;
max-width:650px;

background:rgba(15,20,35,.58);
backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:35px;

padding:35px 25px;

text-align:center;

box-shadow:
0 0 40px rgba(0,255,180,.08),
0 0 80px rgba(130,87,229,.08);
}

.logo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:3px solid rgba(255,255,255,.08);
}

.title{
margin-top:18px;

font-size:42px;
font-weight:700;

background:linear-gradient(
90deg,
#1adbb7,
#58a7ff,
#8d63ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.feature{
margin-top:16px;

padding:18px 20px;

border-radius:22px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.08);

color:white;

font-size:22px;

text-align:left;
}

.join-btn{
display:block;

margin-top:28px;

padding:22px;

text-decoration:none;

font-size:30px;

font-weight:bold;

color:white;

border-radius:60px;

background:linear-gradient(
90deg,
#1adbb7,
#5aa6ff,
#8d63ff);

box-shadow:
0 0 20px rgba(26,219,183,.35),
0 0 40px rgba(141,99,255,.25);
}

.adsby{
display:inline-flex;

align-items:center;

gap:8px;

margin-top:18px;

padding:8px 14px;

border-radius:50px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

text-decoration:none;

color:white;

font-size:13px;
}

.adsby img{
width:20px;
height:20px;
border-radius:50%;
}

.copy{
margin-top:18px;
color:#bcbcbc;
font-size:14px;
}

.links{
margin-top:18px;
}

.links a{
color:white;
margin:0 12px;
}

.disclaimer{
margin-top:18px;
color:#9f9f9f;
font-size:13px;
line-height:1.5;
}

@media(max-width:600px){

.logo{
width:100px;
height:100px;
}

.title{
font-size:30px;
}

.feature{
font-size:16px;
padding:14px;
}

.join-btn{
font-size:22px;
padding:18px;
}

}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="title">
 SURYA BHAU [ 2019 ]
</div>

<div class="feature">• Expert backed predictions</div>
<div class="feature">• Fan sentiment tracking</div>
<div class="feature">• Performance trends</div>
<div class="feature">• Tactical breakdowns</div>

<a href="https://t.me/+rIyZQwSvTvhmOGI1" class="join-btn">
JOIN NOW
</a>

<a href="https://your-site.com" class="adsby">
<img src="ads-logo.png">
Ads By Custom
</a>

<div class="copy">
© 2026 • ALL RIGHTS RESERVED
</div>

<div class="links">
<a href="#">Privacy Policy</a>
<a href="#">Terms of Service</a>
</div>

<div class="disclaimer">
This website is independently operated and is not affiliated with Meta or Facebook.
</div>

</div>

</body>
</html>
